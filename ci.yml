##############################################################################
# .github/workflows/ci.yml
#
# API Sentinel — Continuous Integration & Delivery pipeline
#
# Triggers:
#   push         → main, develop
#   pull_request → main
#
# Jobs:
#   test-go      — Go unit tests + race detector + coverage (all platforms)
#   lint-go      — golangci-lint static analysis
#   build-go     — compile gateway binary (verifies it builds cleanly)
#   test-frontend — TypeScript type-check + Vite production build
#   docker-build — build all Docker images (no push on PRs)
#   docker-push  — push images to GHCR on merge to main
#
# Required secrets (Settings → Secrets and variables → Actions):
#   GHCR_TOKEN   — GitHub personal access token with `write:packages` scope
#                  (or use the automatic GITHUB_TOKEN for GHCR)
##############################################################################

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "22"
  # Container registry — GitHub Container Registry (free for public repos)
  REGISTRY: ghcr.io
  # Image name follows the convention ghcr.io/<owner>/<repo>/<service>
  IMAGE_GATEWAY:   ghcr.io/${{ github.repository }}/gateway
  IMAGE_DASHBOARD: ghcr.io/${{ github.repository }}/dashboard

jobs:
  # ── Go Tests ──────────────────────────────────────────────────────────────
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests with race detector and coverage
        env:
          REDIS_ADDR: "localhost:6379"
        run: |
          go test \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s \
            ./...

      - name: Report coverage
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "## Go Test Coverage" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  # ── Go Lint ───────────────────────────────────────────────────────────────
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── Go Build ──────────────────────────────────────────────────────────────
  build-go:
    name: Go Build
    runs-on: ubuntu-latest
    needs: test-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build gateway binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o ./bin/gateway \
            ./cmd/gateway/...

      - name: Verify binary is a static executable
        run: |
          file ./bin/gateway
          # Must say "statically linked" — fail the job if it's dynamic
          file ./bin/gateway | grep -q "statically linked"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binary-linux-amd64
          path: bin/gateway
          retention-days: 7

  # ── Frontend Tests + Build ────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Upload dashboard dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  # ── Docker Build (all branches — no push) ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: false
          tags: ${{ env.IMAGE_GATEWAY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: false
          tags: ${{ env.IMAGE_DASHBOARD }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Push (main branch only) ───────────────────────────────────────
  docker-push:
    name: Docker Push → GHCR
    runs-on: ubuntu-latest
    needs: [docker-build, lint-go]
    # Only push on merges to main — not on PRs or develop branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for gateway image
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GATEWAY }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Extract metadata for dashboard image
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DASHBOARD }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| gateway   | \`sha-${{ github.sha }}\` + \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| dashboard | \`sha-${{ github.sha }}\` + \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_GATEWAY }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_DASHBOARD }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
